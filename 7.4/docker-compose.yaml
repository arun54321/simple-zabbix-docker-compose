services:
  postgres-zabbix:
    image: postgres:18.4
    container_name: postgres-zabbix
    restart: unless-stopped
    env_file:
      - env.postgres
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - zabbix-net

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-7.4-latest
    container_name: zabbix-server
    restart: unless-stopped
    depends_on:
      - postgres-zabbix
    env_file:
      - env.postgres
      - env.zabbix-server
    environment:
      DB_SERVER_HOST: postgres-zabbix
    ports:
      - "10051:10051"
    networks:
      - zabbix-net

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-7.4-latest
    container_name: zabbix-web
    restart: unless-stopped
    depends_on:
      - postgres-zabbix
      - zabbix-server
    env_file:
      - env.postgres
    environment:
      DB_SERVER_HOST: postgres-zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: Asia/Kolkata
    ports:
      - "8080:8080"
    networks:
      - zabbix-net

  zabbix-agent2:
    image: zabbix/zabbix-agent2:ubuntu-7.4-latest
    container_name: zabbix-agent2
    restart: unless-stopped
    depends_on:
      - zabbix-server
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_HOSTNAME: "Zabbix server"
      ZBX_HOST_ROOTFS: /host
    privileged: true
    pid: host
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /dev:/host/dev:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - zabbix-net

volumes:
  postgres-data:

networks:
  zabbix-net:
    driver: bridge